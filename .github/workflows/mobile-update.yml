name: Mobile OTA Update

on:
  push:
    branches:
      - master
    paths:
      # Anything that ends up in the mobile JS bundle.
      - "apps/mobile/**"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: mobile-ota
  cancel-in-progress: false

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # --ignore-scripts skips the desktop postinstall (Electron binary +
      # better-sqlite3 prebuilt downloads) — not needed to export JS.
      - name: Install dependencies
        run: bun install --ignore-scripts

      # --auto: branch stays "production" (explicit), message = commit message.
      - name: Publish EAS Update
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas-cli update --branch production --auto --non-interactive
