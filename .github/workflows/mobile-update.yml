name: Mobile OTA Update

on:
  push:
    branches:
      - master
    paths:
      # Anything that ends up in the mobile JS bundle.
      - "apps/mobile/**"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: mobile-ota
  cancel-in-progress: false

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm

      # --ignore-scripts skips the desktop postinstall (Electron binary +
      # better-sqlite3 prebuilt downloads) — not needed to export JS.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # --auto: branch stays "production" (explicit), message = commit message.
      - name: Publish EAS Update
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: pnpm dlx eas-cli update --branch production --auto --non-interactive
