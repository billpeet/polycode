name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Auto-incrementing version: major.minor from package.json + run number.
          # Bump major/minor in package.json to reset the series; the run number
          # is monotonically increasing so versions never collide.
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Set package.json version
        shell: bash
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: bun install

      - name: Build app
        run: bun run build

      - name: Build installer and publish to GitHub
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
