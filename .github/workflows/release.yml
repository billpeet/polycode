name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Auto-incrementing version: major.minor from package.json + run number.
          # Bump major/minor in package.json to reset the series; the run number
          # is monotonically increasing so versions never collide.
          BASE=$(node -p "require('./apps/desktop/package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      # npm version chokes on the workspace:* protocol (bun-only), so stamp
      # the version field directly.
      - name: Set package.json version
        shell: bash
        working-directory: apps/desktop
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # --ignore-scripts stops better-sqlite3 (and friends) from compiling via
      # node-gyp, which breaks whenever the runner image's Visual Studio is newer
      # than node-gyp understands. scripts/postinstall.js installs the Electron
      # binary and the matching better-sqlite3 prebuilt instead.
      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Install native prebuilts
        run: node apps/desktop/scripts/postinstall.js

      - name: Build app
        working-directory: apps/desktop
        run: bun run build

      - name: Build installer and publish to GitHub
        working-directory: apps/desktop
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
